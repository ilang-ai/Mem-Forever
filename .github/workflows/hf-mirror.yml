name: Mirror to HuggingFace

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://x-token:${HF_TOKEN}@huggingface.co/datasets/i-Lang/Mem-Forever || git remote set-url hf https://x-token:${HF_TOKEN}@huggingface.co/datasets/i-Lang/Mem-Forever
          git push hf main --force
