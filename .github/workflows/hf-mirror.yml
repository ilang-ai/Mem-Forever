name: Mirror to HuggingFace

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push to HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p /tmp/hf-push
          cp README.md LICENSE CLAUDE.md GEMINI.md AGENTS.md /tmp/hf-push/
          cp -r .ilang /tmp/hf-push/
          cp -r docs /tmp/hf-push/
          cp -r skills /tmp/hf-push/
          cp -r data /tmp/hf-push/

          # Add HF dataset card metadata before README
          printf '%s\n' '---' 'license: mit' 'tags:' '  - ai-memory' '  - i-lang' '  - ilang-protocol' '  - claude-code' '  - cursor' '  - persistent-memory' 'pretty_name: Mem-Forever - AI Persistent Memory Protocol' 'configs:' '  - config_name: default' '    data_files:' '      - split: train' '        path: data/*.jsonl' '---' '' > /tmp/hf-push/README.md
          awk '/^---$/{c++; next} c>=2' README.md >> /tmp/hf-push/README.md

          cd /tmp/hf-push
          git init -b main
          git config user.name "ilang-ai"
          git config user.email "ilang-ai@users.noreply.github.com"
          git add -A
          git commit -m "Sync from GitHub"
          git remote add hf https://ilangai:${HF_TOKEN}@huggingface.co/datasets/i-Lang/Mem-Forever
          git push hf main --force
